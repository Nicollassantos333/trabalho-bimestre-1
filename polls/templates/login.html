<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TechAuth - Login</title>
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', monospace;
        }
        .login-box {
            background: #0a0a0a;
            padding: 50px;
            border: 1px solid #bc13fe; /* Roxo Tech */
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 15px #bc13fe;
            animation: fadeInUp 1s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; } to { opacity: 1; } }
        .user-icon {
            width: 100px;
            filter: drop-shadow(0 0 5px #bc13fe);
            margin-bottom: 20px;
        }
        input {
            display: block;
            width: 250px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: #bc13fe;
            padding: 10px;
            margin: 20px 0;
            transition: 0.5s;
        }
        input:focus { border-bottom-color: #bc13fe; width: 280px; }
        button {
            background: #bc13fe;
            border: none;
            padding: 10px 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        a { color: #555; text-decoration: none; font-size: 12px; margin-top: 20px; display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://cdn-icons-png.flaticon.com/512/3663/3663335.png" class="user-icon" alt="Tech">
        <h2 style="color: #bc13fe;">LOGIN</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" placeholder="USUARIO" required>
            <input type="password" placeholder="SENHA" required>
            <button type="submit" formaction="{% url 'bemvindo' %}">CONECTAR</button>
        </form>
        <a href="{% url 'cadastro' %}">CRIAR CONTA</a>
    </div>
</body>
</html>
