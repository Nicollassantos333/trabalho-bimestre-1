<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TechAuth - Login</title>
    <style>
        body {
            background: #05050a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box {
            background: #0a0a0f;
            padding: 50px;
            border: 1px solid #bc13fe;
            border-radius: 15px; /* Bordas mais modernas */
            text-align: center;
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.2);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* ÍCONE DE CÓDIGO/TECH */
        .user-icon {
            width: 80px;
            filter: drop-shadow(0 0 8px #bc13fe);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        
        .user-icon:hover {
            transform: scale(1.1);
        }

        h2 {
            color: #bc13fe;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        input {
            display: block;
            width: 280px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #222;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            margin: 15px 0;
            transition: 0.3s;
            outline: none;
        }

        input:focus { 
            border-color: #bc13fe; 
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
            background: rgba(188, 19, 254, 0.05);
        }

        /* BOTÃO REFEITO - ESTILO NEON PREMIUM */
        button {
            width: 100%;
            background: transparent;
            border: 2px solid #bc13fe;
            padding: 12px;
            color: #bc13fe;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
        }

        button:hover { 
            background: #bc13fe; 
            color: #000; 
            box-shadow: 0 0 30px #bc13fe;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        a { 
            color: #666; 
            text-decoration: none; 
            font-size: 13px; 
            margin-top: 25px; 
            display: block; 
            transition: 0.3s;
        }

        a:hover { 
            color: #bc13fe; 
            text-shadow: 0 0 5px #bc13fe;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://cdn-icons-png.flaticon.com/512/1693/1693894.png" class="user-icon" alt="Code Icon">
        
        <h2>LOGIN</h2>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="nome" placeholder="nome" required>
            <input type="password" name="senha" placeholder="senha" required>
            <button type="submit" >ACESSAR</button>
        </form>
        
        <a href="{% url 'cadastro' %}">SOLICITAR NOVO ACESSO</a>
    </div>
</body>
</html>
