<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TechAuth - Painel</title>
    <style>
        /* --- ANIMAÇÕES --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bgScroll {
            from { background-position: 0 0; }
            to { background-position: -100% 100%; }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); border-color: rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.5); border-color: rgba(0, 255, 136, 1); }
        }

        /* --- ESTILOS GERAIS --- */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            
            /* Fundo Dinâmico de Partículas/Estrelas */
            background-color: #05050a;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            animation: bgScroll 60s linear infinite;
        }

        /* --- O CARD CENTRAL (Glassmorphism) --- */
        .welcome-card {
            background: rgba(255, 255, 255, 0.03); /* Fundo ultra-transparente */
            backdrop-filter: blur(15px) saturate(180%); /* Efeito de vidro embaçado */
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1s ease-out, glowPulse 4s infinite 1s; /* Entrada e Pulso */
        }

        /* --- O ÍCONE --- */
        .tech-icon {
            width: 80px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.8));
            margin-bottom: 30px;
        }

        /* --- TEXTOS --- */
        h1 {
            font-size: 2.2rem;
            margin: 0;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #00ff88; /* Verde Neon */
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 15px 0 40px;
            line-height: 1.6;
        }

        /* --- BOTÃO MODERNO --- */
        .btn-logout {
            background: linear-gradient(45deg, #00ff88, #008f5d);
            border: none;
            color: #000;
            padding: 15px 40px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px; /* Botão pílula */
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-logout:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.6);
        }

        .btn-logout:active {
            transform: translateY(0);
        }

    </style>
</head>
<body>
    <div class="welcome-card">
        <img src="https://cdn-icons-png.flaticon.com/512/6143/6143924.png" class="tech-icon" alt="Code Icon">
        <h1>BEM-VINDO</h1>
        <p>Você está conectado com autorização.</p>
        <a href="{% url 'login' %}" class="btn-logout">ENCERRAR SESSÃO</a>
    </div>
</body>
</html>
